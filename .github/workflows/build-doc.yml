name: Build Documentation

on:
  push:
    branches:
      - main # Trigger on pushes to the default branch
  pull_request:
    branches:
      - main
  workflow_dispatch:        # Allow manual triggering of the workflow from the GitHub Actions interface

# Cancel previous runs if a new commit is pushed to the same PR or branch
concurrency:
  group: ${{ github.ref }}  # Group runs by the ref (branch or PR)
  cancel-in-progress: true  # Cancel any ongoing runs in the same group

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read  # Read access to repository contents
  pages: write    # Write access to GitHub Pages
  id-token: write # Write access to ID tokens

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build documentation
    steps:
      - uses: actions/checkout@v4

      - name: Build project
        uses: leanprover/lean-action@65f454bc22ec83143241456eee965c2ab702ba6e # 2026-01-15
        with:
          build: true
          lint: false
          mk_all-check: true
      
      - name: Lint project
        run: |
          lake exe runLinter KernelHom

      - name: Build Verso Documentation
        run: |
          cd verso
          ./build_manual.sh
      
      # - name: Build DocGen Documentation
      #   run: |
      #     cd docbuild
      #     ./build_docgen.sh
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with: 
          github_token: ${{ secrets.GITHUB_TOKEN }} 
          publish_dir: verso/html